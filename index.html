<script type="text/x-dc" data-dc-script data-props="{
  &quot;releaseDate&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Overrides&quot; },
  &quot;heroVideoId&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Overrides&quot; }
}">
class Component extends DCLogic {
  state = {
    look: this.props.look || 'forest-noir',
    modal: null,
    cd: { d: '--', h: '--', m: '--', s: '--' },
    muted: true,
    showNav: true,
    mobileNavOpen: false
  };

  componentDidMount() {
    this.tick();
    this._iv = setInterval(() => this.tick(), 1000);
    if (this.bg && !this.bg.src) { this.bg.src = this.bgUrl(); }
    this._kick = () => { this.bgCmd('playVideo'); };
    ['pointerdown', 'keydown', 'touchstart', 'wheel'].forEach((ev) => window.addEventListener(ev, this._kick, { passive: true }));
    this._lastY = 0;
    this._onScroll = (e) => {
      const t = e.target;
      const el = (t && t.nodeType === 1) ? t : (document.scrollingElement || document.documentElement);
      if (!el || (el.scrollHeight - el.clientHeight) < 40) return;
      const y = el.scrollTop || 0;
      if (this._raf) { this._pendY = y; return; }
      this._raf = requestAnimationFrame(() => { this._raf = null; this.updateNav(this._pendY != null ? this._pendY : y); this._pendY = null; });
      this._pendY = y;
    };
    window.addEventListener('scroll', this._onScroll, true);
    this._onMove = (e) => { const w = e.clientY < 56; if (w !== this._mouseWant) { this._mouseWant = w; this.applyNav(); } };
    window.addEventListener('mousemove', this._onMove, { passive: true });
    this._onKeyDown = (e) => this.handleGlobalKey(e);
    window.addEventListener('keydown', this._onKeyDown);
    this._onResize = () => { if (window.innerWidth > 760 && this.state.mobileNavOpen) this.closeMobileNav(false); };
    window.addEventListener('resize', this._onResize, { passive: true });
  }
  componentWillUnmount() {
    clearInterval(this._iv);
    this.lock(false);
    if (this._kick) { ['pointerdown', 'keydown', 'touchstart', 'wheel'].forEach((ev) => window.removeEventListener(ev, this._kick)); }
    if (this._onScroll) { window.removeEventListener('scroll', this._onScroll, true); }
    if (this._onMove) { window.removeEventListener('mousemove', this._onMove); }
    if (this._onKeyDown) { window.removeEventListener('keydown', this._onKeyDown); }
    if (this._onResize) { window.removeEventListener('resize', this._onResize); }
    if (this._raf) { cancelAnimationFrame(this._raf); }
  }
  componentDidUpdate(prev) {
    if (prev.look !== this.props.look && this.props.look && this.props.look !== this.state.look) {
      this.setState({ look: this.props.look });
    }
  }

  tick() {
    // Release dates use Indian Standard Time because the theatrical campaign is India-first.
    const rd = this.releaseInfo().iso + 'T00:00:00+05:30';
    let diff = Math.max(0, new Date(rd).getTime() - Date.now());
    const d = Math.floor(diff / 86400000); diff -= d * 86400000;
    const h = Math.floor(diff / 3600000); diff -= h * 3600000;
    const m = Math.floor(diff / 60000); diff -= m * 60000;
    const s = Math.floor(diff / 1000);
    const p = (n) => String(n).padStart(2, '0');
    this.setState({ cd: { d: String(d), h: p(h), m: p(m), s: p(s) } });
  }

  lock(on) {
    try { document.documentElement.style.overflow = on ? 'hidden' : ''; } catch (e) {}
    this.bgCmd(on ? 'pauseVideo' : 'playVideo');
  }
  bgUrl() {
    const id = this.heroVideoId();
    return 'https://www.youtube-nocookie.com/embed/' + id + '?autoplay=1&mute=1&controls=0&loop=1&playlist=' + id + '&modestbranding=1&rel=0&playsinline=1&enablejsapi=1&disablekb=1&fs=0&iv_load_policy=3';
  }
  bgCmd(func) {
    try { const w = this.bg && this.bg.contentWindow; if (w) w.postMessage(JSON.stringify({ event: 'command', func: func, args: [] }), 'https://www.youtube-nocookie.com'); } catch (e) {}
  }
  toggleMute() {
    const m = !this.state.muted;
    this.setState({ muted: m });
    this.bgCmd(m ? 'mute' : 'unMute');
    this.bgCmd('playVideo');
  }
  updateNav(y) {
    const last = this._lastY || 0;
    if (y <= 64) this._scrollWant = false;
    else if (y < last - 3) this._scrollWant = true;
    else if (y > last + 3) this._scrollWant = false;
    this._lastY = y;
    this.applyNav();
  }
  applyNav() {
    // Keep navigation available at the top; scroll direction only controls it farther down.
    const show = this.state.mobileNavOpen || this._lastY <= 64 || !!(this._scrollWant || this._mouseWant);
    if (show !== this.state.showNav) this.setState({ showNav: show });
  }
  toggleMobileNav() {
    this.setState((state) => ({ mobileNavOpen: !state.mobileNavOpen, showNav: true }));
  }
  closeMobileNav(returnFocus) {
    if (!this.state.mobileNavOpen) return;
    this.setState({ mobileNavOpen: false });
    if (returnFocus && this._mobileNavButton) setTimeout(() => this._mobileNavButton.focus(), 0);
  }
  handleGlobalKey(e) {
    if (this.state.modal) {
      this.handleModalKey(e);
      return;
    }
    if (this.state.mobileNavOpen && e.key === 'Escape') {
      e.preventDefault();
      this.closeMobileNav(true);
    }
  }
  siteContent() {
    const content = window.PHOTOGRAPHER_SITE_CONTENT;
    if (content && content.film) return content;
    // Defensive fallback: keep the shell usable if the optional content asset fails to load.
    return {
      build: { version: '1.5.0' },
      film: { title: 'Photographer', releaseDate: '2026-08-15', contentRating: 'U/A', releaseFormat: '2D', heroVideoId: '0c78E4Fr-OI' },
      navigation: [],
      booking: { cities: [], partners: [] },
      social: { film: [], artist: [] },
      videos: [],
      shorts: [],
      cast: [],
      crew: []
    };
  }
  heroVideoId() {
    return this.props.heroVideoId || this.siteContent().film.heroVideoId;
  }
  releaseInfo() {
    const defaultDate = this.siteContent().film.releaseDate || '2026-08-15';
    const candidate = this.props.releaseDate || defaultDate;
    const parsed = new Date(candidate + 'T00:00:00Z');
    const valid = /^\d{4}-\d{2}-\d{2}$/.test(candidate) && !Number.isNaN(parsed.getTime()) && parsed.toISOString().slice(0, 10) === candidate;
    const iso = valid
      ? candidate
      : defaultDate;
    const date = new Date(iso + 'T00:00:00Z');
    return {
      iso,
      year: String(date.getUTCFullYear()),
      long: new Intl.DateTimeFormat('en-GB', { day: 'numeric', month: 'long', year: 'numeric', timeZone: 'UTC' }).format(date),
      short: new Intl.DateTimeFormat('en-GB', { day: 'numeric', month: 'short', year: 'numeric', timeZone: 'UTC' }).format(date)
    };
  }

  showModal(modal) {
    this._returnFocus = document.activeElement;
    this._modalFocused = false;
    this.setState({ modal });
    this.lock(true);
  }
  handleModalKey(e) {
    if (!this.state.modal) return;
    if (e.key === 'Escape') {
      e.preventDefault();
      this.closeModal();
      return;
    }
    if (e.key !== 'Tab' || !this._dialog) return;
    const focusable = Array.from(this._dialog.querySelectorAll('button, a[href], iframe, input, [tabindex]:not([tabindex="-1"])'))
      .filter((el) => !el.disabled && el.getAttribute('aria-hidden') !== 'true');
    if (!focusable.length) return;
    const first = focusable[0];
    const last = focusable[focusable.length - 1];
    if (e.shiftKey && document.activeElement === first) {
      e.preventDefault();
      last.focus();
    } else if (!e.shiftKey && document.activeElement === last) {
      e.preventDefault();
      first.focus();
    }
  }
  openVideo(item) {
    this.showModal({ kind: 'video', videoId: item.id || null, title: item.title, placeholder: !item.id });
  }
  openShort(item) {
    this.showModal({ kind: 'short', videoId: item.id || null, title: item.title, placeholder: !item.id });
  }
  openTrailer() {
    this.showModal({ kind: 'video', videoId: this.heroVideoId(), title: this.siteContent().film.title + ' — Official Trailer', placeholder: false });
  }
  playSample() {
    this.setState(s => ({ modal: { ...s.modal, videoId: this.heroVideoId(), placeholder: false, title: s.modal.title + ' (sample)' } }));
  }
  closeModal() {
    if (!this.state.modal) return;
    const returnFocus = this._returnFocus;
    this.setState({ modal: null });
    this._modalFocused = false;
    this.lock(false);
    if (returnFocus && typeof returnFocus.focus === 'function') setTimeout(() => returnFocus.focus(), 0);
  }

  onImgError(e) {
    const t = e.target;
    if (!t.dataset.fb) {
      t.dataset.fb = '1';
      const id = (t.getAttribute('src').match(/\/vi\/([^/]+)\//) || [])[1] || this.heroVideoId();
      t.src = 'https://img.youtube.com/vi/' + id + '/hqdefault.jpg';
    }
  }

  themeVars() {
    const T = {
      'forest-noir': '',
      'charcoal-amber': "--bg:#0c0b0a;--bg-2:#100e0c;--surface:#17140f;--surface-2:#211b12;--text:#efe9df;--muted:#b6aa95;--faint:#9a8f7e;--border:rgba(224,182,110,0.16);--accent:oklch(0.8 0.12 78);--accent-ink:#17120a;--accent-soft:rgba(224,179,86,0.13);--stripe:rgba(224,179,86,0.07);--overlay:8,7,5;--grain:0.05;--shadow:0 24px 60px -40px rgba(0,0,0,0.85);--display-weight:700;--font-display:'Archivo',sans-serif;--font-body:'Hanken Grotesk',sans-serif;",
      'editorial-mono': "--bg:#f4f2ee;--bg-2:#eae7e1;--surface:#ffffff;--surface-2:#f7f5f1;--text:#141312;--muted:#57544d;--faint:#66635d;--border:rgba(20,19,18,0.16);--accent:oklch(0.55 0.2 27);--accent-ink:#ffffff;--accent-soft:rgba(192,54,43,0.09);--stripe:rgba(20,19,18,0.07);--overlay:20,19,17;--grain:0;--shadow:0 1px 2px rgba(20,19,18,0.05),0 30px 60px -42px rgba(20,19,18,0.4);--display-weight:700;--font-display:'Archivo',sans-serif;--font-body:'Hanken Grotesk',sans-serif;"
    };
    return T[this.state.look] || '';
  }

  renderVals() {
    const content = this.siteContent();
    const vid = this.heroVideoId();
    const yt = (id, q) => 'https://img.youtube.com/vi/' + id + '/' + (q || 'maxresdefault') + '.jpg';
    const release = this.releaseInfo();

    const links = (items) => (items || []).map(item => ({ l: item.label, h: item.href }));
    const trailers = (content.videos || []).map(item => {
      const id = item.videoId === 'hero' ? vid : item.videoId;
      const v = { title: item.title, kind: item.kind, dur: item.duration, id, thumb: id ? yt(id) : null };
      return {
        ...v,
        striped: !v.thumb,
        cap: v.kind.toLowerCase(),
        onClick: () => this.openVideo(v),
        thumbRef: (el) => {
          if (!el || !v.thumb) return;
          el.onerror = (e) => this.onImgError(e);
          if (el.dataset.source !== v.thumb) {
            delete el.dataset.fb;
            el.dataset.source = v.thumb;
            el.src = v.thumb;
          }
        }
      };
    });

    const shorts = (content.shorts || []).map(item => {
      const s = { title: item.title, meta: item.meta, views: item.views, id: item.videoId || null };
      return { ...s, onClick: () => this.openShort(s) };
    });
    const cast = (content.cast || []).map(person => ({
      name: person.name,
      role: person.role,
      tag: person.tag,
      socials: links(person.socialProfile ? content.social[person.socialProfile] : [])
    }));
    const crew = content.crew || [];
    const filmSocials = links(content.social.film);
    const filmInstagram = (content.social.film || []).find(item => item.label === 'Instagram');

    const m = this.state.modal;
    const box = m && m.kind === 'short'
      ? 'position:relative;height:min(84vh,760px);aspect-ratio:9 / 16;'
      : 'position:relative;width:min(94vw,980px);aspect-ratio:16 / 9;';

    return {
      themeVars: this.themeVars(),
      bgRef: (this._bgRef || (this._bgRef = (el) => { this.bg = el; if (el && !el.src) { el.src = this.bgUrl(); } })),
      modalIframeRef: (this._modalIframeRef || (this._modalIframeRef = (el) => {
        if (!el) return;
        const src = this.state.modal && this.state.modal.videoId
          ? 'https://www.youtube-nocookie.com/embed/' + this.state.modal.videoId + '?autoplay=1&rel=0&modestbranding=1'
          : '';
        if (el.src !== src) el.src = src;
      })),
      toggleMute: () => this.toggleMute(),
      muted: this.state.muted,
      soundOn: !this.state.muted,
      soundLabel: this.state.muted ? 'Unmute trailer background' : 'Mute trailer background',
      releaseDateIso: release.iso,
      releaseDateLong: release.long,
      releaseDateShort: release.short,
      releaseYear: release.year,
      siteVersion: content.build.version,
      filmTitle: content.film.title,
      contentRating: content.film.contentRating,
      releaseFormat: content.film.releaseFormat,
      filmInstagramHref: filmInstagram ? filmInstagram.href : '#',
      navTransform: this.state.showNav ? 'translateY(0)' : 'translateY(-100%)',
      navOpacity: this.state.showNav ? '1' : '0',
      navPE: this.state.showNav ? 'auto' : 'none',
      navLinks: links(content.navigation).map(item => ({ ...item, onClick: () => this.closeMobileNav(false) })),
      mobileNavOpen: this.state.mobileNavOpen,
      mobileNavLabel: this.state.mobileNavOpen ? 'Close navigation menu' : 'Open navigation menu',
      mobileNavButtonRef: (this._mobileNavButtonRef || (this._mobileNavButtonRef = (el) => { this._mobileNavButton = el; })),
      toggleMobileNav: () => this.toggleMobileNav(),
      closeMobileNav: () => this.closeMobileNav(false),
      cities: content.booking.cities || [],
      partners: links(content.booking.partners),
      footerSocials: filmSocials,
      trailers, shorts, cast, crew,
      cd: this.state.cd,
      openTrailer: () => this.openTrailer(),
      notify: (e) => {
        if (e && typeof e.preventDefault === 'function') e.preventDefault();
        try { window.alert('Notification signup is not connected yet. No email address has been submitted.'); } catch (err) {}
      },
      modalOpen: !!m,
      modalBoxStyle: box,
      modalIframe: m && m.videoId ? true : false,
      modalPlaceholder: m ? !!m.placeholder : false,
      modalTitle: m ? m.title : '',
      modalDialogRef: (this._modalDialogRef || (this._modalDialogRef = (el) => { this._dialog = el; })),
      modalCloseRef: (this._modalCloseRef || (this._modalCloseRef = (el) => {
        if (el && this.state.modal && !this._modalFocused) {
          this._modalFocused = true;
          setTimeout(() => el.focus(), 0);
        }
      })),
      closeModal: () => this.closeModal(),
      playSample: () => this.playSample(),
      stop: (e) => e.stopPropagation()
    };
  }
}
</script>
</body>

<x-dc>
<section id="shorts" style="padding:clamp(56px,8vw,120px) 0;background:var(--bg-2);border-top:1px solid var(--border);scroll-margin-top:74px;">
  <div class="site-container"><div class="media-heading-row"><div><div class="section-kicker">Shorts &amp; Reels</div><h2 class="section-heading">From the set</h2></div><a href="{{ filmInstagramHref }}" target="_blank" rel="noopener noreferrer" style="font-family:var(--font-mono);font-size:13px;letter-spacing:0.06em;color:var(--muted);">@photographerthemovie<span class="external-icon"></span></a></div></div>
  <div tabindex="0" aria-label="Shorts and reels carousel" style="max-width:1360px;margin:0 auto;padding:4px clamp(18px,4vw,44px) 8px;display:flex;gap:16px;overflow-x:auto;scroll-snap-type:x proximity;scrollbar-width:thin;scrollbar-color:var(--border) transparent;">
    <sc-for list="{{ shorts }}" as="s" hint-placeholder-count="6">
      <button type="button" onClick="{{ s.onClick }}" style="flex:0 0 clamp(178px,18vw,232px);scroll-snap-align:start;cursor:pointer;padding:0;background:transparent;text-align:left;">
        <div style="position:relative;aspect-ratio:9 / 16;border-radius:18px;overflow:hidden;border:1px solid var(--border);background:repeating-linear-gradient(135deg, var(--stripe) 0 11px, transparent 11px 22px), var(--surface);box-shadow:var(--shadow);transition:transform .25s ease,border-color .25s ease;" style-hover="transform:translateY(-4px);border-color:var(--accent);">
          <span style="position:absolute;left:12px;top:12px;font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;color:var(--accent-ink);background:var(--accent);padding:3px 8px;border-radius:6px;font-weight:600;">{{ s.meta }}</span>
          <div style="position:absolute;inset:0;background:linear-gradient(to top, rgba(0,0,0,0.7), transparent 45%);"></div>
          <span style="position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);width:46px;height:46px;border-radius:999px;background:rgba(0,0,0,0.4);border:1.5px solid rgba(255,255,255,0.8);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;backdrop-filter:blur(4px);">▶</span>
          <div style="position:absolute;left:13px;right:13px;bottom:13px;"><div style="color:#fff;font-size:14px;font-weight:600;line-height:1.25;">{{ s.title }}</div><div style="font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,0.7);margin-top:5px;">{{ s.views }} views</div></div>
        </div>
      </button>
    </sc-for>
  </div>
</section>
</x-dc>

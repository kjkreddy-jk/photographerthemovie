<x-dc>
<section id="tickets" style="padding:clamp(58px,8vw,120px) 0;background:var(--bg-2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);scroll-margin-top:74px;">
  <div style="max-width:900px;margin:0 auto;padding:0 clamp(18px,4vw,44px);text-align:center;">
    <div style="font-family:var(--font-mono);font-size:12px;letter-spacing:0.3em;text-transform:uppercase;color:var(--accent);margin-bottom:20px;">◉ In Cinemas Soon</div>
    <h2 style="font-family:var(--font-display);font-weight:var(--display-weight);font-size:clamp(40px,6vw,86px);line-height:1;margin:0;color:var(--text);"><time datetime="{{ releaseDateIso }}">{{ releaseDateLong }}</time></h2>
    <p style="font-size:15px;color:var(--muted);margin:18px 0 0;letter-spacing:0.02em;">Releasing in {{ releaseFormat }} across select cities · Certified {{ contentRating }}</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:26px 0 0;">
      <sc-for list="{{ cities }}" as="c" hint-placeholder-count="6">
        <span class="ticket-city" style="font-size:13px;color:var(--muted);padding:7px 14px;border:1px solid var(--border);border-radius:999px;background:var(--surface);">{{ c }}</span>
      </sc-for>
    </div>
    <div style="display:flex;gap:13px;flex-wrap:wrap;justify-content:center;margin-top:34px;">
      <button class="notification-request-button" type="button" onClick="{{ notify }}" style="padding:19px 38px;border-radius:999px;background:var(--accent);color:var(--accent-ink);font-weight:700;font-size:17px;cursor:pointer;">Get Notified When Booking Opens</button>
      <sc-for list="{{ partners }}" as="p" hint-placeholder-count="2">
        <a href="{{ p.h }}" target="_blank" rel="noopener noreferrer" style="padding:19px 34px;border-radius:999px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-weight:600;font-size:17px;display:inline-flex;align-items:center;gap:8px;" style-hover="border-color:var(--accent);">{{ p.l }}<span class="external-icon"></span></a>
      </sc-for>
    </div>
    <p style="font-family:var(--font-mono);font-size:11px;letter-spacing:0.1em;color:var(--faint);margin:22px 0 0;">Pre-booking partners · dates subject to change</p>
  </div>
</section>
</x-dc>
